<main class="main-grid">

    <img src="https://picsum.photos/600?1" data-full="https://picsum.photos/1200?1" onclick="openImg(this.dataset.full)">
    <img src="https://picsum.photos/600?2" data-full="https://picsum.photos/1200?2" onclick="openImg(this.dataset.full)">
    <img src="https://picsum.photos/600?3" data-full="https://picsum.photos/1200?3" onclick="openImg(this.dataset.full)">
    <img src="https://picsum.photos/600?4" data-full="https://picsum.photos/1200?4" onclick="openImg(this.dataset.full)">

    <img src="https://picsum.photos/600?8" data-full="https://picsum.photos/1200?8" onclick="openImg(this.dataset.full)">

</main>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeImg()">
    <div class="close-btn" onclick="closeImg(event)">X</div>
    <img id="lightbox-img">
</div>

<script>
function openImg(src) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = src;
}

function closeImg(event) {
    if (event) event.stopPropagation();
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
