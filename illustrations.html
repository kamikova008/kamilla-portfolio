<body>

    <a href="index.html" class="logo">K.K.K.KAMILLA PORTFOLIO</a>

    <nav>
        <a href="illusztraciok.html" class="active">illusztrációk</a>

<main class="main-grid">

    <img src="https://picsum.photos/600?1" onclick="openImg(this.src)">
    <img src="https://picsum.photos/600?2" onclick="openImg(this.src)">
    <img src="https://picsum.photos/600?3" onclick="openImg(this.src)">
    <img src="https://picsum.photos/600?4" onclick="openImg(this.src)">

    <img src="https://picsum.photos/600?5" onclick="openImg(this.src)">
    <img src="https://picsum.photos/600?6" onclick="openImg(this.src)">
    <img src="https://picsum.photos/600?7" onclick="openImg(this.src)">
    <img src="https://picsum.photos/600?8" onclick="openImg(this.src)">

</main>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeImg()">
    <img id="lightbox-img">
    <div class="close-btn">X</div>
</div>

<script>
function openImg(src) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = src;
}

function closeImg() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
