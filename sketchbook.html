<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Sketchbook</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <a href="index.html" class="logo">K.K.K.KAMILLA PORTFOLIO</a>

    <nav>
        <a href="illusztraciok.html">illusztrációk</a>
        <a href="sketchbook.html" class="active">sketchbook</a>
        <a href="webshop.html">webshop</a>
        <a href="rolam.html">rólam</a>
    </nav>
</header>

<main class="book-wrapper">

    <!-- bal oldal -->
    <div class="page" id="leftPage">
        <img src="https://picsum.photos/600/800?1">
    </div>

    <!-- jobb oldal -->
    <div class="page" id="rightPage">
        <img src="https://picsum.photos/600/800?2">
    </div>

</main>

<!-- NAV GOMBOK -->
<div class="book-nav">
    <button onclick="prevPage()">← előző</button>
    <button onclick="nextPage()">következő →</button>
</div>

<script>
const pages = [
    ["https://picsum.photos/600/800?1", "https://picsum.photos/600/800?2"],
    ["https://picsum.photos/600/800?3", "https://picsum.photos/600/800?4"],
    ["https://picsum.photos/600/800?5", "https://picsum.photos/600/800?6"],
    ["https://picsum.photos/600/800?7", "https://picsum.photos/600/800?8"]
];

let index = 0;

function render() {
    document.getElementById("leftPage").innerHTML =
        `<img src="${pages[index][0]}">`;

    document.getElementById("rightPage").innerHTML =
        `<img src="${pages[index][1]}">`;
}

function nextPage() {
    if (index < pages.length - 1) {
        index++;
        render();
    }
}

function prevPage() {
    if (index > 0) {
        index--;
        render();
    }
}

render();
</script>

</body>
</html>
